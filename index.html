<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass App v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script defer src="script.js"></script>
</head>
<body>
  <div class="scene">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="bg-orb orb3"></div>

    <aside class="drawer" id="drawer">
      <div class="drawer-head">
        <div>
          <div class="drawer-title">Menu</div>
          <div class="drawer-sub">Navigation iOS-like</div>
        </div>
        <button class="round-btn" data-close-drawer>✕</button>
      </div>

      <button class="drawer-item active" data-route="home">⌂ Home</button>
      <button class="drawer-item" data-route="media">◔ Media</button>
      <button class="drawer-item" data-route="settings">⚙ Settings</button>
      <button class="drawer-item" data-open="profile">◌ Profile</button>
      <button class="drawer-item" data-open="action">＋ Quick Action</button>

      <div class="drawer-footer">↩ Back</div>
    </aside>

    <main class="phone" id="phone">
      <div class="phone-shell"></div>
      <div class="light-line"></div>

      <header class="topbar">
        <button class="top-icon active" data-route="home">⌂</button>
        <button class="top-icon" data-route="search">⌕</button>
        <button class="top-icon" data-open="notifications">◔</button>
        <button class="top-icon" data-open="profile">◌</button>
      </header>

      <section class="screen" id="screen"></section>

      <nav class="bottomnav">
        <button class="nav-item" data-route="search">⌕</button>
        <button class="nav-item active" data-route="home">⌂</button>
        <button class="nav-item" data-open="notifications">◔</button>
      </nav>

      <button class="fab" data-open="action">＋</button>
    </main>

    <div class="toast" id="toast">Action envoyée</div>
  </div>

  <dialog class="modal" id="modalProfile">
    <div class="modal-head">
      <div>
        <div class="modal-title">Profile</div>
        <div class="modal-sub">Popup iOS</div>
      </div>
      <button class="round-btn" data-close-modal="modalProfile">✕</button>
    </div>

    <div class="profile-card">
      <div class="avatar">SN</div>
      <div>
        <div class="profile-name">Skalli Noureddine</div>
        <div class="profile-meta">Marseille · Creative UI</div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="glass-btn" data-route="settings">Open Settings</button>
      <button class="glass-btn" data-open="action">Quick Action</button>
    </div>
  </dialog>

  <dialog class="modal" id="modalAction">
    <div class="modal-head">
      <div>
        <div class="modal-title">Quick Action</div>
        <div class="modal-sub">Create a floating sheet</div>
      </div>
      <button class="round-btn" data-close-modal="modalAction">✕</button>
    </div>

    <div class="action-grid">
      <button class="action-tile">◌ Post</button>
      <button class="action-tile">♫ Music</button>
      <button class="action-tile">✉ Message</button>
      <button class="action-tile">★ Favorite</button>
    </div>
  </dialog>
</body>
</html>
